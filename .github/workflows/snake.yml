name: Generate Contribution Snake

# Regenerates the animated contribution snake used in the profile README.
# Runs on a schedule, on push to the default branch, and on manual trigger.
# Output is committed to the `output` branch, which the README references.
on:
  schedule:
    - cron: "0 */12 * * *" # twice a day
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=7C3AED&color_dots=12152B,3B2A63,5B3FA0,7C3AED,06B6D4
            dist/github-contribution-grid-snake.svg?color_snake=7C3AED&color_dots=EDE9FE,C4B5FD,A78BFA,7C3AED,06B6D4

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
