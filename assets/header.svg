<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-label="Peter Kibet, handle Spidey-Acer, Solo Founder, Claude Ambassador Kenya, Software Engineer">
  <title>Peter Kibet — @Spidey-Acer</title>

  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06140D"/>
      <stop offset="55%" stop-color="#0A1E14"/>
      <stop offset="100%" stop-color="#0C2418"/>
    </linearGradient>

    <linearGradient id="nameGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="55%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#A3E635"/>
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#A3E635"/>
    </linearGradient>

    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0FDF4" stop-opacity="1"/>
      <stop offset="45%" stop-color="#86EFAC" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#86EFAC" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="ambientViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="ambientCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#84CC16" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#84CC16" stop-opacity="0"/>
    </radialGradient>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>

    <filter id="dotBlur" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>

    <filter id="textShadow" x="-20%" y="-40%" width="140%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="400" fill="url(#bgGradient)"/>

  <!-- Ambient glow blobs for depth -->
  <circle cx="140" cy="410" r="220" fill="url(#ambientViolet)" filter="url(#softBlur)"/>
  <circle cx="980" cy="360" r="180" fill="url(#ambientCyan)" filter="url(#softBlur)"/>

  <!-- Spider-web motif, top-right corner -->
  <g stroke="url(#accentGradient)" fill="none" opacity="0.12" stroke-width="1">
    <circle cx="1050" cy="90" r="40"/>
    <circle cx="1050" cy="90" r="80"/>
    <circle cx="1050" cy="90" r="120"/>
    <circle cx="1050" cy="90" r="160"/>
    <circle cx="1050" cy="90" r="200"/>
    <circle cx="1050" cy="90" r="240"/>

    <line x1="1050" y1="90" x2="1290.0" y2="90.0"/>
    <line x1="1050" y1="90" x2="1257.8" y2="210.0"/>
    <line x1="1050" y1="90" x2="1170.0" y2="297.8"/>
    <line x1="1050" y1="90" x2="1050.0" y2="330.0"/>
    <line x1="1050" y1="90" x2="930.0" y2="297.8"/>
    <line x1="1050" y1="90" x2="842.2" y2="210.0"/>
    <line x1="1050" y1="90" x2="810.0" y2="90.0"/>
    <line x1="1050" y1="90" x2="842.2" y2="-30.0"/>
    <line x1="1050" y1="90" x2="930.0" y2="-117.8"/>
    <line x1="1050" y1="90" x2="1050.0" y2="-150.0"/>
    <line x1="1050" y1="90" x2="1170.0" y2="-117.8"/>
    <line x1="1050" y1="90" x2="1257.8" y2="-30.0"/>
  </g>

  <!-- Pulsing accent strand within the web -->
  <line x1="1050" y1="90" x2="842.2" y2="210.0" stroke="url(#accentGradient)" stroke-width="1.4" opacity="0.18">
    <animate attributeName="opacity" values="0.12;0.5;0.12" dur="3.2s" repeatCount="indefinite"/>
  </line>

  <!-- Traveling glow node along a web strand -->
  <circle cx="0" cy="0" r="4.2" fill="url(#dotGlow)" filter="url(#dotBlur)">
    <animateMotion path="M1050,90 L842.2,210 L1050,90" keyTimes="0;0.5;1" dur="5s" calcMode="linear" repeatCount="indefinite"/>
  </circle>
  <circle cx="0" cy="0" r="1.6" fill="#F0F9FF">
    <animateMotion path="M1050,90 L842.2,210 L1050,90" keyTimes="0;0.5;1" dur="5s" calcMode="linear" repeatCount="indefinite"/>
  </circle>

  <!-- Circuit-trace-meets-sprout icon, bottom-right, low opacity -->
  <g transform="translate(1108, 322)" opacity="0.16" stroke="url(#accentGradient)" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0,48 L0,18"/>
    <path d="M0,22 C-14,22 -16,8 -8,0 C-2,8 -2,16 0,22 Z" fill="url(#accentGradient)" fill-opacity="0.5" stroke="none"/>
    <path d="M0,22 C14,22 16,8 8,0 C2,8 2,16 0,22 Z" fill="url(#accentGradient)" fill-opacity="0.5" stroke="none"/>
    <path d="M0,48 L20,48 L20,34"/>
    <path d="M0,60 L-20,60 L-20,44"/>
    <circle cx="20" cy="30" r="3"/>
    <circle cx="-20" cy="40" r="3"/>
    <circle cx="0" cy="64" r="3"/>
  </g>

  <!-- Name -->
  <text x="80" y="196" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="url(#nameGradient)" filter="url(#textShadow)" letter-spacing="-1">Peter Kibet</text>

  <!-- Handle -->
  <text x="562" y="150" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#86EFAC" opacity="0.92">@Spidey-Acer</text>

  <!-- Accent underline -->
  <rect x="80" y="216" width="320" height="3" rx="1.5" fill="url(#accentGradient)" opacity="0.7">
    <animate attributeName="opacity" values="0.45;0.9;0.45" dur="2.6s" repeatCount="indefinite"/>
  </rect>

  <!-- Role line -->
  <text x="80" y="262" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="26" font-weight="500" fill="#CBD5E1">Solo Founder &#183; Claude Ambassador Kenya &#183; Software Engineer</text>

  <!-- Tagline -->
  <text x="80" y="316" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#94A3B8">Shipping production AI software from Nairobi, Kenya</text>
</svg>
